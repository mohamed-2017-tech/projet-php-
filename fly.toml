# fly.toml app configuration file generated for patisserie0amani on 2026-05-20T11:55:19Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'patisserie0amani'
primary_region = 'ams'

[build]

[deploy]
  release_command = "mysql -h $DB_HOST -u $DB_USER -p$DB_PASS $DB_NAME < /var/www/html/patisserie.sql"

[env]
  DB_HOST = "your-db-host" # Sera remplacé par l'adresse de votre base de données Fly.io
  DB_USER = "user"
  DB_PASS = "password"
  DB_NAME = "patisserie"

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256